# https://taskfile.dev

version: '3'

vars:
  DOCKER_USERNAME: yolowingpixie
  CONTAINER_NAME: devcontainer
  DEPS: [yq]
  WSL_DISTRO: DevContainer
  WSL_DIR: C:\WSL\DevContainer
  TAR_FILE: devcontainer.tar

tasks:
  default:
    cmds:
      - task: build:base
      - task: build
      - task: docker:tag:dev-latest
      - task: run

  build:base:
    desc: "Build system layer image"
    silent: true
    cmds:
      - |
        docker build \
          --build-arg UBUNTU_VERSION=$(yq -r .base.ubuntu config.yaml) \
          -f Dockerfile.base \
          -t {{.CONTAINER_NAME}}-base \
          .

  build:
    desc: "Build user layer image"
    aliases: [docker:build]
    silent: true
    cmds:
      - |
        docker build \
          --build-arg BASE_IMAGE={{.CONTAINER_NAME}}-base \
          -t {{.CONTAINER_NAME}} \
          .
  run:
    desc: "Run container with Docker socket mounted (platform-specific)"
    aliases: [docker:run]
    cmds:
      - task: run:{{OS}}

  run:darwin:
    internal: true
    desc: "Run container on macOS"
    platforms: [darwin]
    silent: true
    cmds:
      - docker run -it -v /var/run/docker.sock:/var/run/docker.sock {{.CONTAINER_NAME}}

  run:windows:
    internal: true
    desc: "Run container on Windows (Docker Desktop)"
    platforms: [windows]
    silent: true
    cmds:
      - docker run -it --privileged -v //var/run/docker.sock:/var/run/docker.sock {{.CONTAINER_NAME}}

  docker:tag:dev-latest:
    desc: "Tag image"
    silent: true
    cmds:
      - docker tag {{.CONTAINER_NAME}} {{.DOCKER_USERNAME}}/{{.CONTAINER_NAME}}:dev-latest

  wsl:install:
    desc: "Build image and (re)import into WSL, replacing any existing distro"
    aliases: [wsl]
    platforms: [windows]
    cmds:
      - task: build
      - task: docker:tag:dev-latest
      - task: wsl:unregister
      - task: wsl:export
      - task: wsl:import
      - wsl --set-default {{.WSL_DISTRO}}
      - wsl -d {{.WSL_DISTRO}}

  wsl:unregister:
    internal: true
    platforms: [windows]
    ignore_error: true
    cmds:
      - wsl --unregister {{.WSL_DISTRO}}

  wsl:export:
    internal: true
    platforms: [windows]
    cmds:
      - docker create --name tmp-export {{.DOCKER_USERNAME}}/{{.CONTAINER_NAME}}:dev-latest
      - docker export tmp-export -o {{.TAR_FILE}}
      - docker rm tmp-export

  wsl:import:
    internal: true
    platforms: [windows]
    cmds:
      - task: wsl:mkdir
      - wsl --import {{.WSL_DISTRO}} "{{.WSL_DIR}}" {{.TAR_FILE}}

  wsl:mkdir:
    internal: true
    platforms: [windows]
    ignore_error: true
    cmds:
      - mkdir "{{.WSL_DIR}}"

  docker:push:
    desc: "Push image"
    silent: true
    cmds:
      - docker push {{.DOCKER_USERNAME}}/{{.CONTAINER_NAME}}

  stop:
    silent: true
    cmds:
      - docker stop {{.CONTAINER_NAME}}

  setup:
    desc: "Setup missing dependencies via appropriate package manager for each platform"
    cmds:
      - task: setup:{{OS}}

  setup:windows:
    internal: true
    platforms: [windows]
    cmds:
      - task: ensure-scoop
      - for: {var: DEPS}
        task: install-if-missing:windows
        vars:
          PACKAGE: '{{.ITEM}}'

  setup:darwin:
    internal: true
    platforms: [darwin]
    cmds:
      - task: ensure-brew
      - for: {var: DEPS}
        task: install-if-missing:darwin
        vars:
          PACKAGE: '{{.ITEM}}'

  install-if-missing:darwin:
    internal: true
    platforms: [darwin]
    label: 'install-{{.PACKAGE}}'
    status:
      - which {{.PACKAGE}}
    cmds:
      - echo "Installing {{.PACKAGE}} via brew..."
      - brew install {{.PACKAGE}}

  install-if-missing:windows:
    internal: true
    platforms: [windows]
    label: 'install-{{.PACKAGE}}'
    status:
      - Get-Command {{.PACKAGE}}
    cmds:
      - echo "Installing {{.PACKAGE}} via scoop..."
      - scoop install {{.PACKAGE}}

  ensure-scoop:
    internal: true
    platforms: [windows]
    status:
      - scoop --version
    cmds:
      - echo "Installing scoop..."
      - Invoke-WebRequest -UseBasicParsing get.scoop.sh | Invoke-Expression
      - scoop update

  ensure-brew:
    internal: true
    platforms: [darwin]
    status:
      - brew --version
    cmds:
      - echo "Installing brew..."
      - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - brew update